<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة رئيسية</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <div class="head">
            <h2>شركة الجوهري</h2>
            <p>وَفِي السَّمَاءِ رِزْقُكُمْ وَمَا تُوعَدُونَ</p>
        </div>

        <!-- INPUT SECTION -->
        <div class="input">

            <input placeholder="البند" type="text" id="item"> 
            <input placeholder="صنف" type="text" id="category">

            <div class="price">
                <input placeholder="سعر الشراء" onkeyup="totalprofit()" type="number" id="buy_price">  
                <input placeholder="سعر البيع" onkeyup="totalprofit()" type="number" id="sell_price">
                <input placeholder="عدد" onkeyup="totalprofit()" type="number" id="quantity">  
                <small id="profit">0</small>
            </div>

            <button id="submit" type="button">اتمام</button>
        </div>

        <!-- OUTPUT SECTION -->
        <div class="output">

            <div class="searchblock">
                <input type="text" id="search" placeholder="البند">
                <button id="searchbtn" type="button">بحث</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th scope="col">id</th>
                        <th scope="col">البند</th>
                        <th scope="col">الصنف</th>
                        <th scope="col">سعر الشراء</th>
                        <th scope="col">سعر البيع</th>
                        <th scope="col">عدد</th>
                        <th scope="col">تعديل</th>
                        <th scope="col">حذف</th>
                    </tr>
                </thead>

                <tbody id="tbody"></tbody> 
            </table>

        </div>
    </div>  

    <!-- CHAT UI -->
    <div class="chat-container">

        <div id="chat-box" class="chat-box hidden" role="dialog">

            <div class="chat-header">
                <h3>Gemini AI</h3>
            </div>

            <div class="chat-messages" id="chat-messages">
                <p class="bot-msg">Hello! How can I help you today?</p>
            </div>

            <div class="chat-input-area" id="chat-input-area">

                <input type="password" id="API_KEY" placeholder="Enter API Key...">

                <div id="chat-controls" style="display:none;">
                <input type="text" id="user-input" placeholder="Type a message...">
                <button id="send-btn">Send</button>
                </div>

                <button id="start-chat-btn">Start Chat</button>

            </div>

        </div>

        <button id="floating-ai-btn" class="floating-btn" type="button">🤖</button>
    </div>

    <script src="main.js"></script>   
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> 
</body>
</html>
